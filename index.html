<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Rocketship</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/gh/luminsdk/script@latest/lumin.min.js"></script>
    
    <style>
        :root {
            --purple-glow: rgba(168, 85, 247, 0.5);
            --bg-dark: #0f0f12;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg-dark);
            color: white;
            max-width: 600px; 
            margin: 40px auto; 
            padding: 0 20px; 
        }

        h1 { font-weight: 300; letter-spacing: 2px; text-align: center; color: #a855f7; }

        #gameSearch { 
            width: 100%; 
            padding: 15px; 
            background: #1a1a1f; 
            border: 1px solid #333; 
            border-radius: 12px; 
            color: white;
            font-size: 16px;
            box-shadow: 0 0 10px var(--purple-glow);
            transition: 0.3s;
            box-sizing: border-box;
        }

        #gameSearch:focus { outline: none; border-color: #a855f7; }

        #gameList { list-style: none; padding: 0; margin-top: 30px; }

        .game-item { 
            display: flex; 
            align-items: center; 
            padding: 15px; 
            border-bottom: 1px solid #222; 
            cursor: pointer;
            transition: 0.2s;
        }

        .game-item:hover { background: #1a1a1f; color: #a855f7; }

        .game-item img { border-radius: 8px; margin-right: 20px; }

        #playerContainer { 
            margin-top: 40px; 
            min-height: 500px; 
            background: #000; 
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 0 30px var(--purple-glow);
        }
    </style>
</head>
<body>

    <h1>ROCKETSHIP</h1>
    <input type="text" id="gameSearch" placeholder="Search games...">
    <ul id="gameList"></ul>
    <div id="playerContainer"></div>

    <script>
        const listEl = document.getElementById('gameList');
        const searchEl = document.getElementById('gameSearch');
        let allGames = [];

        async function init() {
            Lumin.init({ container: '#hidden' });
            allGames = await Lumin.getGames();
            renderList(allGames);
        }

        function renderList(games) {
            listEl.innerHTML = games.map(game => `
                <li class="game-item" onclick="Lumin.launch('${game.id}', {container: '#playerContainer'})">
                    <img src="${game.thumbnail}" width="40" height="40">
                    <span>${game.title}</span>
                </li>
            `).join('');
        }

        searchEl.addEventListener('input', (e) => {
            const filtered = allGames.filter(g => 
                g.title.toLowerCase().includes(e.target.value.toLowerCase())
            );
            renderList(filtered);
        });

        document.body.insertAdjacentHTML('beforeend', '<div id="hidden" style="display:none"></div>');
        init();
    </script>
</body>
</html>
